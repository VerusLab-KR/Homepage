<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@800&amp;family=Inter:wght@400;500;600;700&amp;display=swap');
    </style>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#0e1629"/>
      <stop offset="100%" stop-color="#0c1222"/>
    </linearGradient>

    <radialGradient id="orb1" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>

    <filter id="blur1"><feGaussianBlur stdDeviation="70"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="90"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Orb 1 — top right -->
  <ellipse cx="1020" cy="-80" rx="460" ry="460" fill="url(#orb1)" filter="url(#blur1)" opacity="0.9"/>

  <!-- Orb 2 — bottom left -->
  <ellipse cx="120" cy="740" rx="400" ry="400" fill="url(#orb2)" filter="url(#blur2)" opacity="0.85"/>

  <!-- Subtle grid -->
  <g opacity="0.035" stroke="#60a5fa" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Left accent bar -->
  <rect x="80" y="160" width="4" height="310" rx="2" fill="url(#lineGrad)" opacity="0.55"/>

  <!-- Badge: WEBS System Korea R&D Lab -->
  <rect x="108" y="160" width="248" height="32" rx="16" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="1"/>
  <text x="232" y="181" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#60a5fa" text-anchor="middle" letter-spacing="0.05em">WEBS SYSTEM KOREA  R&amp;D LAB</text>

  <!-- Logo: VerusLab -->
  <text x="108" y="302" font-family="'Exo 2', Inter, sans-serif" font-size="92" font-weight="800" letter-spacing="0.02em">
    <tspan fill="#ffffff">Verus</tspan><tspan fill="#4f8ef7">Lab</tspan>
  </text>

  <!-- Main tagline -->
  <text x="110" y="358" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#94a3b8">엔지니어링의 복잡함을 소프트웨어로 풀어냅니다</text>

  <!-- Divider -->
  <rect x="108" y="390" width="600" height="1" fill="#1e293b"/>

  <!-- Product pills -->
  <!-- Simulation -->
  <rect x="108" y="412" width="148" height="34" rx="17" fill="rgba(29,78,216,0.12)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="182" y="434" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#60a5fa" text-anchor="middle">Simulation</text>

  <!-- Valentis -->
  <rect x="268" y="412" width="110" height="34" rx="17" fill="rgba(6,182,212,0.10)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="323" y="434" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#22d3ee" text-anchor="middle">Valentis</text>

  <!-- Linkspace -->
  <rect x="390" y="412" width="118" height="34" rx="17" fill="rgba(6,182,212,0.10)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="449" y="434" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#22d3ee" text-anchor="middle">Linkspace</text>

  <!-- URL — bottom right -->
  <text x="1120" y="592" font-family="Inter, -apple-system, sans-serif" font-size="17" font-weight="600" fill="#334155" text-anchor="end">verus-lab.kr</text>

  <!-- Node network decoration — right side -->
  <g opacity="0.22" stroke="#60a5fa" stroke-width="0.9">
    <circle cx="920" cy="180" r="3" fill="#60a5fa" stroke="none"/>
    <circle cx="1020" cy="260" r="2.5" fill="#60a5fa" stroke="none"/>
    <circle cx="1080" cy="160" r="2" fill="#60a5fa" stroke="none"/>
    <circle cx="1000" cy="380" r="3" fill="#60a5fa" stroke="none"/>
    <circle cx="880" cy="310" r="2.5" fill="#60a5fa" stroke="none"/>
    <circle cx="1130" cy="320" r="2" fill="#60a5fa" stroke="none"/>
    <circle cx="960" cy="460" r="2.5" fill="#60a5fa" stroke="none"/>
    <circle cx="840" cy="230" r="2" fill="#60a5fa" stroke="none"/>
    <circle cx="1060" cy="480" r="2" fill="#60a5fa" stroke="none"/>
    <circle cx="1150" cy="440" r="2.5" fill="#60a5fa" stroke="none"/>

    <line x1="920" y1="180" x2="1020" y2="260"/>
    <line x1="1020" y1="260" x2="1080" y2="160"/>
    <line x1="920" y1="180" x2="1080" y2="160"/>
    <line x1="1020" y1="260" x2="1000" y2="380"/>
    <line x1="1000" y1="380" x2="880" y2="310"/>
    <line x1="1020" y1="260" x2="1130" y2="320"/>
    <line x1="1130" y1="320" x2="1080" y2="160"/>
    <line x1="1000" y1="380" x2="960" y2="460"/>
    <line x1="880" y1="310" x2="840" y2="230"/>
    <line x1="840" y1="230" x2="920" y2="180"/>
    <line x1="1060" y1="480" x2="960" y2="460"/>
    <line x1="1060" y1="480" x2="1130" y2="320"/>
    <line x1="1150" y1="440" x2="1130" y2="320"/>
    <line x1="1150" y1="440" x2="1060" y2="480"/>
  </g>
</svg>
