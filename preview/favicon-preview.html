<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Favicon Preview</title>
<style>
body{font-family:'Inter',sans-serif;background:#1e293b;color:#fff;padding:40px;display:flex;flex-direction:column;gap:40px;align-items:center}
h1{font-size:1.5rem;font-weight:700;margin-bottom:8px}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:32px}
.item{text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px}
.item span{font-size:.75rem;color:#94a3b8}
.preview{display:flex;gap:16px;align-items:center}
.size-32 svg{width:32px;height:32px}
.size-20 svg{width:20px;height:20px}
.size-16 svg{width:16px;height:16px}
.tab-mock{display:flex;align-items:center;gap:8px;background:#334155;border-radius:8px 8px 0 0;padding:8px 16px;margin-top:8px}
.tab-mock svg{width:16px;height:16px}
.tab-mock span{font-size:.72rem;color:#cbd5e1}
</style>
</head>
<body>
