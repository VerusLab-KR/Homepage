- id: cfd-airflow
  name: 유동해석 기본교육 — 기류
  subtitle: SOLIDWORKS Flow Simulation
  type: fluid
  sections:
    - title: 매니폴드 기류해석 프로젝트 작성
      topics:
        - 해석 조건 마법사(Wizard) 사용법
        - 결과 플롯 작성 및 내보내기
    - title: 메시 작성 (유체 메시 기준)
      topics:
        - 최적화 옵션 및 로컬 메시 설정 방법
    - title: 다공성 매체(Porous Media)
      topics:
        - 촉매 변환 장치의 사례 확인
    - title: 회전 참조 프레임(Rotating Simulation)
      topics:
        - 팬 회전 유동 궤적 사례
    - title: 자유표면 해석
      topics:
        - 자유표면 기능을 사용한 2 Phase 유동해석
    - title: 입자 스터디(Particle Study)
      topics:
        - 송풍기 내부 입자 스터디 사례
    - title: FEA 하중 전달
      topics:
        - 유압에 의한 구조물 응력/변형률 확인

- id: cfd-thermal
  name: 유동해석 기본교육 — 열유동
  subtitle: SOLIDWORKS Flow Simulation
  type: fluid
  sections:
    - title: 열 전달 해석(Heat Transfer)
      topics:
        - 전자 인클로저 내부 열 전달 해석 사례
        - 팬 커브(Fan Curve) / 다공판(Perforated Plate)
        - 열 소스(Heat Source) 및 고체 재질 설정
    - title: 메시 작성 (유체/고체 메시 기준)
      topics:
        - 최적화 옵션 및 로컬 메시 설정 방법
        - 수동 메시 설정 방법
    - title: 외부 비정상 해석(Transient Heat Case)
      topics:
        - 전자 장치 냉각의 사례
        - 시간대 별 해석조건 설정 및 적용
    - title: 복합 열 전달
      topics:
        - 가열된 냉각판 열 전달 해석 사례
        - 다중 유체가 있는 열 교환기 사례
    - title: 파라미터 스터디
      topics:
        - Goal 최적화 설계 스터디
        - 다중 변수를 이용한 설계 시나리오 스터디

- id: fea-optimization
  name: 구조해석 최적화 해석
  subtitle: SOLIDWORKS Simulation
  type: structural
  sections:
    - title: 시뮬레이션의 중요성 및 이해
      topics:
        - 해석의 필요성 및 활용 방향
        - 구조해석의 개념 및 필요한 입력 데이터 정의
    - title: 구조 안정성 분석
      topics:
        - 전처리 (경계조건, 하중, 재료물성치 정의 및 격자 생성)
        - 해석 결과 분석
    - title: 중량 저감을 위한 설계 변수 분석
      topics:
        - 입출력 파라미터 정의 및 시나리오 생성
        - 변수 조합에 따른 응력/중량 비교 및 Best Case 선정
    - title: ChatGPT를 활용한 시나리오 생성 및 민감도 분석
      topics:
        - Latin Hypercube Sampling 기반 시나리오 생성
        - 입출력 파라미터 상관관계 및 민감도 분석
    - title: SmartSIM을 활용한 데이터 기반 설계 사양 분석
      topics:
        - 제약조건을 만족하는 설계 사양 분석
        - 해석결과 분석 보고서 자동 생성
    - title: 위상 최적화
      topics:
        - 최적화를 위한 목표 및 구속조건 설정
        - 제조 제약조건을 고려한 형상 최적화

- id: fea-vibration
  name: 구조해석 진동/충격 해석
  subtitle: SOLIDWORKS Simulation
  type: structural
  sections:
    - title: 선형 동적 해석의 이해
      topics:
        - 충격/하모닉응답/랜덤진동/응답스펙트럼
    - title: 고유진동 해석의 이해
      topics:
        - 고유진동주파수, 모드 형상, 질량참여율
        - 댐핑
    - title: 충격 해석 실습
      topics:
        - 전처리 (경계조건, 하중, 재료물성치 정의 및 격자 생성)
        - 해석 결과 분석 (질량참여율, 누적 질량참여율, 모드 형상, 응력, 변위, 가속도 응답)
    - title: 랜덤진동 해석 실습
      topics:
        - 전처리 (경계조건, 하중, 재료물성치 정의 및 격자 생성)
        - 해석 결과 분석 (질량참여율, 누적 질량참여율, 모드 형상, 응력, 변위, 가속도 응답)
    - title: 랜덤진동 피로해석 실습
      topics:
        - Damage & Life Cycle (수명 예측)
    - title: 공진 회피 설계
      topics: []

- id: fea-basic
  name: 구조해석 기본교육
  subtitle: SOLIDWORKS Simulation
  type: structural
  sections:
    - title: FEA 개요 및 소개
      topics:
        - 구조 해석 배경 및 소개
        - SOLIDWORKS Simulation 제품 소개
    - title: SOLIDWORKS Simulation Study 작성
      topics:
        - SOLIDWORKS Simulation 환경 및 기본 설정 소개
        - Simulation 파일 관리 및 방법 소개
    - title: 구조 해석 절차
      topics:
        - 파트 해석을 통한 Case Study
        - 솔리드 요소를 사용하여 구조 해석 작성
        - Meshing 작성 소개
        - Mesh Quality 소개 및 컨트롤 사용법 확인
        - 메시 수렴성 소개
        - 변위 및 응력 결과에 미치는 메시 방법
        - Post-processing 절차
        - 결과 수렴성의 소개
    - title: 파트 & 어셈블리 구조 해석
      topics:
        - 부품 간의 Contact 기능 소개 및 정의
        - 대칭 조건의 이해
        - 원형 좌표계를 사용하여 결과 산출 (배관 & 파이프 관련 응력 확인 방법)
        - 다양한 접촉 조건과 커넥터를 사용하여 복합한 솔리드 메시 어셈블리 해석
        - 호환 및 비호환 메시의 이해
    - title: Shell 요소 부품 해석
      topics:
        - Shell 모델의 정의
        - Shell 파트의 구조 해석 수행 및 결과 확인 방법
        - Shell 모델에 대한 응력 정의 및 확인 방법
        - 원격 하중/질량 사용법
    - title: 빔 요소 해석
      topics:
        - 빔 요소의 정의
        - 빔 요소를 사용하여 용접구조물 모델 해석
    - title: 솔리드, 빔, 쉘 혼합 모델 해석
      topics:
        - 솔리드, 빔, 쉘 요소를 사용한 메시 및 접촉 적용 방법
        - 혼합 요소 어셈블리의 결과 확인 방법
        - 원형 좌표계를 사용하여 결과 산출 (배관 & 파이프 관련 응력 확인 방법)
        - 다양한 접촉 조건과 커넥터를 사용하여 복합한 어셈블리 해석
    - title: 최적화 해석
      topics:
        - 파라미터의 최적화 해석 정의
        - 위상 최적화 해석 소개
    - title: 좌굴 및 모달 해석 기본 소개
      topics:
        - 좌굴 및 모달 해석의 이해
        - 좌굴 해석 Load Factor 개념
        - 선형 vs 비선형 좌굴 해석 비교
        - Mass Participation Factor 개념
    - title: 열전달 해석 기본 소개
      topics:
        - 열전달 해석의 이해
        - 열 응력 해석의 이해
        - 열 전달 (구조) 해석 vs 열 유동 해석의 비교
    - title: 비선형 해석 기본 소개
      topics:
        - 선형 및 비선형 해석의 비교
        - 비선형 해석의 종류와 예제 소개
