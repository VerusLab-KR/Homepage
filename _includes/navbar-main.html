<style>
/* ── Navbar (Main) ── */
.navbar{position:fixed;top:0;left:0;right:0;z-index:900;background:rgba(15,23,42,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);transition:all .4s cubic-bezier(.4,0,.2,1)}
.navbar.scrolled{background:rgba(15,23,42,.95);box-shadow:0 2px 16px rgba(0,0,0,.25)}
.navbar .container{display:flex;align-items:center;justify-content:space-between;height:64px}
.nav-logo{font-family:'Exo 2','Inter',sans-serif;font-size:1.5rem;font-weight:800;letter-spacing:.02em;line-height:1;color:#fff;text-rendering:geometricPrecision;transition:text-shadow .3s}
.nav-logo:hover{text-shadow:0 0 12px rgba(96,165,250,.5),0 0 24px rgba(96,165,250,.2)}
.nav-logo span{color:#4f8ef7;position:relative;top:.04em}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{font-size:.84rem;font-weight:500;color:#94a3b8;transition:.3s cubic-bezier(.4,0,.2,1);position:relative}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:#60a5fa;border-radius:1px;transition:width .3s cubic-bezier(.4,0,.2,1)}
.nav-links a:hover,.nav-links a.active{color:#60a5fa}
.nav-links a:hover::after,.nav-links a.active::after{width:100%}
.nav-dropdown{position:relative}
.nav-dropdown-menu{position:absolute;top:calc(100% + 12px);left:50%;transform:translateX(-50%) translateY(4px);background:rgba(15,23,42,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:6px 0;min-width:0;opacity:0;visibility:hidden;transition:all .2s cubic-bezier(.4,0,.2,1);box-shadow:0 8px 32px rgba(0,0,0,.3);list-style:none}
.nav-dropdown:hover .nav-dropdown-menu{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
.nav-dropdown-menu li a{display:block;padding:7px 18px;font-size:.78rem;font-weight:500;color:#94a3b8;white-space:nowrap;transition:all .15s}
.nav-dropdown-menu li a:hover{color:#60a5fa;background:rgba(96,165,250,.06)}
.nav-dropdown-menu li a::after{display:none}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px}
.hamburger span{display:block;width:20px;height:1.5px;background:#94a3b8;margin:5px 0;transition:all .3s;border-radius:1px}
/* ── Subnav ── */
.subnav{position:fixed;top:64px;left:0;right:0;z-index:850;background:rgba(15,23,42,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06);transform:translateY(-100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.subnav.visible{transform:translateY(0)}
.subnav .container{display:flex;align-items:center;height:44px}
.subnav-links{display:flex;list-style:none}
.subnav-links a{font-size:.82rem;font-weight:500;color:#94a3b8;padding:0 16px;height:44px;display:flex;align-items:center;position:relative;transition:.2s;white-space:nowrap}
.subnav-links a:hover,.subnav-links a.active{color:#60a5fa}
.subnav-links a.active::after{content:'';position:absolute;bottom:0;left:16px;right:16px;height:2px;background:#3b82f6;border-radius:1px 1px 0 0}
/* ── Responsive (Navbar) ── */
@media(max-width:900px){
  .nav-links{display:none;position:absolute;top:64px;left:0;right:0;background:#1a1f2e;flex-direction:column;align-items:center;padding:24px 0;gap:20px;box-shadow:0 8px 24px rgba(0,0,0,.3);border-bottom:1px solid rgba(255,255,255,.08)}
  .nav-links.open{display:flex}
  .nav-dropdown-menu{position:static;transform:none!important;background:transparent;border:none;box-shadow:none;backdrop-filter:none;padding:0;opacity:1;visibility:visible;display:flex;flex-direction:column;align-items:center;gap:12px}
  .nav-dropdown>a{display:none}
  .nav-dropdown-menu li a{padding:0;color:#94a3b8}
  .hamburger{display:block}
  .hamburger.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
  .hamburger.active span:nth-child(2){opacity:0}
  .hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
}
@media(max-width:600px){.subnav-links a{padding:0 10px;font-size:.78rem}}
</style>

<nav class="navbar" id="navbar">
  <div class="container">
    <a href="/" class="nav-logo">Verus<span>Lab</span></a>
    <ul class="nav-links" id="navLinks">
      <li class="nav-dropdown">
        <a href="/#products" class="active">Solutions</a>
        <ul class="nav-dropdown-menu">
          <li><a href="/simulation/">Simulation</a></li>
          <li><a href="/valentis/">Valentis</a></li>
          <li><a href="/linkspace/">Linkspace</a></li>
        </ul>
      </li>
      <li><a href="/#news">News</a></li>
      <li><a href="/blog/">Blog</a></li>
      <li><a href="/#about">About</a></li>
      <li><a href="/#contact">Contact</a></li>
    </ul>
    <div class="lang-toggle" id="langToggle">
      <button onclick="setLang('ko')" class="active">KO</button>
      <button onclick="setLang('en')">EN</button>
      <button onclick="setLang('zh')">ZH</button>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
